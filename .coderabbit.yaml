# Enables IDE autocompletion for this config file
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# Language for CodeRabbit's review comments
language: en

# Enable experimental features
early_access: true

chat:
  # CodeRabbit will automatically respond to @coderabbitai mentions in PR comments
  auto_reply: true

reviews:
  profile: assertive # Options: chill (focuses on significant issues), assertive (more thorough)

  auto_review:
    # Automatically trigger reviews when PRs are opened or updated
    enabled: true
    # Skip auto-review if PR title contains these keywords
    ignore_title_keywords:
      - "WIP"
    # Don't auto-review draft PRs
    drafts: false
    # Only auto-review PRs targeting these branches
    base_branches:
      - main
      - develop

  # Include a high-level summary at the start of each review
  high_level_summary: true

  # Generate sequence diagrams for complex code flows
  sequence_diagrams: true

  # Include poems in reviews
  poem: true

  # Show review completion status
  review_status: true

  # Keep the walkthrough section expanded by default
  collapse_walkthrough: false

  # Include summary of all changed files
  changed_files_summary: true

  # Automatically request changes on the PR (just leave comments)
  request_changes_workflow: true

  # Pre-merge checks to enforce before merging PRs
  pre_merge_checks:
    description:
      # Validate that PR has a proper description
      mode: warning # Options: off, warning, error

  # Exclude these paths from reviews (build artifacts and dependencies)
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/coverage/**"

  # Use the following tools when reviewing
  tools:
    eslint:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      enabled_only: false
      level: default
    gitleaks:
      enabled: true
    yamllint:
      enabled: true

  # Apply the following labels to PRs
  labeling_instructions:
    - label: JavaScript
      instructions: Apply when the PR/MR contains changes to JavaScript source-code
    - label: React
      instructions: Apply when the PR/MR contains changes to React components
    - label: CSS
      instructions: Apply when the PR/MR contains changes to CSS files
    - label: Documentation
      instructions: Apply whenever project documentation (namely markdown source-code) is updated by the PR/MR
    - label: Bug Fix
      instructions: Apply when the PR/MR fixes a bug or resolves an issue
    - label: Enhancement
      instructions: Apply when the PR/MR adds new features or improvements
    - label: Linter
      instructions: Apply when the purpose of the PR/MR is related to fixing the feedback from a linter

  # Review instructions that apply to all files
  instructions: |
    - Verify that documentation and comments are free of spelling mistakes
    - Ensure that test code is automated, comprehensive, and follows testing best practices
    - Verify that all critical functionality is covered by tests
    - Confirm that the code meets the project's requirements and objectives
    - Point out redundant obvious comments that do not add clarity to the code
    - Ensure that comments are concise and suggest more concise comment statements if possible
    - Look for code duplication
    - Suggest code completions when:
        - seeing a TODO comment
        - seeing a FIXME comment

  # Custom review instructions for specific file patterns
  path_instructions:
    # JavaScript source files - INLINE COMMENT COVERAGE
    - path: "src/**/*.js"
      instructions: |
        **Inline Comment Coverage Check (PRIORITY)**
        
        Ensure all public and private methods and significant properties have clear inline comments addressing:
        
        1. **What each logical block does** (not just restating the code)
           - Example: "Safety check: prevent errors if modal was destroyed"
           - Example: "Animate in after short delay for smooth transition"
        
        2. **Why non-obvious logic exists**
           - Example: "Shared body overflow management: only increment counter if this instance doesn't already own the lock"
           - Example: "Clear any pending animations (both open and close to prevent race conditions)"
        
        3. **Edge cases and guards**
           - Example: "Re-entrancy guard to prevent duplicate initialization"
           - Example: "Safety check in case destroy() was called during async operation"
        
        **Flag any newly added or modified function or property that lacks descriptive inline comments.**
        
        Preferred style:
        - Use inline comments (// comment) within method bodies
        - Focus on "what" and "why", not just repeating the code
        - Comment before logical blocks, not every line
        - Explain non-obvious patterns like reference counting, state management, async guards
        
        Examples of GOOD comments:
        ✓ // Safety check: prevent errors if modal was destroyed
        ✓ // Shared body overflow management: only increment if not already owned
        ✓ // Clear any pending animations to prevent race conditions
        
        Examples of BAD comments:
        ✗ // Set overflow to hidden (just restates the code)
        ✗ // Increment counter (doesn't explain why)
        ✗ No comment at all for complex logic
        
        **Additional JavaScript Best Practices:**
        - Check for major style guide violations
        - No exposed API keys or sensitive data
        - Avoid common security vulnerabilities (XSS, injection attacks)
        - Ensure proper error handling
        - Review for performance issues
    
    # React component files - INLINE COMMENT COVERAGE
    - path: "src/**/*.jsx"
      instructions: |
        **Inline Comment Coverage Check for React Components**
        
        Ensure all component methods, hooks, and significant state management logic have clear inline comments:
        
        1. **What each logical block does**
        2. **Why non-obvious React patterns exist** (e.g., useEffect dependencies, memo optimizations)
        3. **Edge cases and component lifecycle considerations**
        
        **Flag any newly added or modified function or hook that lacks descriptive inline comments.**
        
        **React Best Practices:**
        - Avoid 'any' in TypeScript, use explicit types
        - Prefer 'import type' for type imports
        - Ensure proper React hooks usage
        - Check for unnecessary re-renders
        - Validate prop types
        - No exposed API keys or sensitive data
    
    # CSS files
    - path: "**/*.css"
      instructions: |
        Review CSS code for:
        - Adherence to best practices
        - Proper naming conventions for classes
        - Performance optimizations
        - Consistent styling patterns
    
    # HTML files
    - path: "**/*.html"
      instructions: |
        Review HTML code for:
        - Adherence to HTML5 standards
        - Proper semantic markup
        - Accessibility (ARIA labels, alt text)
        - Performance optimizations
    
    # Test files
    - path: "**/*.test.{js,jsx}"
      instructions: |
        Review test files for:
        - Comprehensive coverage of component/function behavior
        - Proper use of testing libraries
        - Async behavior is properly tested
        - Test descriptions are sufficiently detailed
        - Tests are not tautological
    
    # Markdown documentation
    - path: "**/*.md"
      instructions: |
        Review documentation for:
        - Spelling and grammar
        - Clear and concise explanations
        - Up-to-date information
        - Proper formatting and structure
        - Working links and references
